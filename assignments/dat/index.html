<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <p class="label">MOOD TRACKER</p>

    <h1>How are you feeling?</h1>

    <p class="subtitle">
      Track your emotions, spot patterns, and<br />
      take care of yourself.
    </p>

    <section class="card-grid">
      <button class="card purple">
        <div class="icon">🎨</div>
        <h2>Theme</h2>
        <p>Customise colours and display to match your mood.</p>
      </button>

      <button class="card green">
        <div class="icon">📊</div>
        <h2>Stats</h2>
        <p>See your mood patterns over time with clear charts.</p>
      </button>

      <button class="card orange">
        <div class="glow"></div>
        <h2>Help</h2>
        <p>Guidance and resources for your wellbeing.</p>
      </button>

      <button class="card blue">
        <div class="icon">📝</div>
        <h2>Entries</h2>
        <p>View and reflect on all your past mood logs.</p>
      </button>
    </section>

    <footer>MoodTracker — built for high school students</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
